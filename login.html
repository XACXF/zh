<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 租号管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>租号管理系统</h1>
            
            <!-- 登录表单 -->
            <div class="form-section">
                <h2>登录</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="loginUsername" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div class="form-section">
                <h2>注册新账号</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <input type="text" id="regUsername" placeholder="新用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="新密码" required>
                    </div>
                    <button type="submit" class="btn btn-success">注册</button>
                </form>
            </div>

            <p class="tips">提示：每个账户的数据独立存储</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // 检查是否已登录
        const currentUser = sessionStorage.getItem('currentUser');
        if (currentUser) {
            window.location.href = 'index.html';
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                sessionStorage.setItem('currentUser', username);
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        });

        // 注册
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }

            let users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.username === username)) {
                alert('用户名已存在');
                return;
            }

            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            alert('注册成功，请登录');
            document.getElementById('registerForm').reset();
        });
    </script>
</body>
</html>
